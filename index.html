<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta id="themeColorMeta" name="theme-color" content="#eef2f7" />
  <title>Dashboard – Aufträge</title>
  <script>
    (function () {
      var THEME_KEY = 'svs-dashboard-theme';
      var theme = 'light';
      try {
        var saved = localStorage.getItem(THEME_KEY);
        if (saved === 'dark' || saved === 'light') theme = saved;
      } catch (_) {
        try {
          var sessionSaved = sessionStorage.getItem(THEME_KEY);
          if (sessionSaved === 'dark' || sessionSaved === 'light') theme = sessionSaved;
        } catch (_) {}
      }
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
      var meta = document.getElementById('themeColorMeta');
      if (meta) meta.content = theme === 'dark' ? '#0b0f14' : '#eef2f7';
      try {
        var params = new URLSearchParams(window.location.search);
        var kiosk = params.get('kiosk');
        if (kiosk === '1' || kiosk === 'true') {
          document.documentElement.setAttribute('data-kiosk', '1');
        }
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=29">
</head>
<body class="dashboard">

  <header class="app-header">
    <div class="brand">
      <img src="Logo.png" alt="SV-Souleiman Logo" class="logo" />
    </div>

    <div class="header-main">
      <div class="ticker-container">
        <div class="ticker">
          <span id="naechsteNummer"></span>
        </div>
      </div>
    </div>

    <button type="button" id="adminToggle" class="admin-toggle" hidden aria-label="Admin entsperren" title="Admin entsperren">
      <span class="admin-toggle-icon" aria-hidden="true">🔒</span>
    </button>

    <button type="button" id="themeToggle" class="theme-toggle" aria-label="Design umschalten" title="Dunkles Design">
      <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
    </button>
  </header>

  <main class="app-main">
    <div class="board" id="board"></div>

    <div class="legend" aria-label="Legende">
      <span class="legend-item"><span class="dot red"></span> Unvollständig</span>
      <span class="legend-item"><span class="dot orange"></span> Vollständig</span>
      <span class="legend-item"><span class="dot green"></span> Geprüft</span>
      <span class="legend-item"><span class="dot unknown"></span> Unbekannt</span>
      <span class="legend-item"><span class="dot aged"></span> ≥ 3 Tage</span>
    </div>
  </main>

  <footer class="app-footer">
    <div class="stats-strip" id="statsStrip">
      <div class="stat-cell stat-cell-rb" id="rbCountWidget" aria-label="Offene RB">
        <span class="stat-label">Offene RB</span>
        <span class="stat-value" id="rbCountValue">–</span>
      </div>
      <div class="stat-cell stat-cell-open state-green" id="openCountWidget" aria-label="Offene Akten">
        <span class="stat-label">Offene Akten</span>
        <span class="stat-value value">0</span>
      </div>
      <div class="stat-cell stat-cell-sync" id="syncStatCell" title="Fehlt eine Drive-Akte im Dashboard?">
        <span class="stat-label">Abgleich</span>
        <span class="stat-value stat-value-text" id="uploadSyncValue">–</span>
      </div>
      <div class="stat-cell stat-cell-time" id="updateInfo"></div>
    </div>
  </footer>

  <div id="pinModal" class="pin-modal" hidden>
    <div class="pin-modal-dialog" role="dialog" aria-labelledby="pinModalTitle" aria-modal="true">
      <h2 id="pinModalTitle" class="pin-modal-title">Admin-PIN</h2>
      <form id="pinForm" class="pin-form">
        <input
          id="pinInput"
          class="pin-input"
          type="password"
          inputmode="numeric"
          pattern="\d{4}"
          maxlength="4"
          autocomplete="off"
          placeholder="••••"
          aria-label="4-stellige PIN"
        />
        <p id="pinError" class="pin-error" aria-live="polite"></p>
        <div class="pin-actions">
          <button type="button" id="pinCancel" class="pin-btn pin-btn-secondary">Abbrechen</button>
          <button type="submit" class="pin-btn pin-btn-primary">Entsperren</button>
        </div>
      </form>
    </div>
  </div>

<script src="script.js?v=58"></script>
</body>
</html>
