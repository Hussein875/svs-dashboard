<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard – Aufträge</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <!-- Kopfzeile mit Logo und Ticker -->
  <div class="top-bar">
    <div class="logo-container">
      <img src="Logo.png" alt="SV-Souleiman Logo" class="logo" />
    </div>

    <div class="ticker-container">
      <div class="ticker">
        <span id="naechsteNummer"></span>
      </div>
    </div>
  </div>

  <!-- Kanban-Board -->
  <div class="board" id="board"></div>

  <!-- Untere Leiste mit Legende und Timer -->
  <div class="bottom-bar">
    <div class="legend">
      <span><span class="dot red"></span> Unvollständig</span>
      <span><span class="dot yellow"></span> Zu prüfen</span>
      <span><span class="dot green"></span> Geprüft</span>
    </div>
    <div id="uploadStatsWidget" class="upload-stats" aria-label="Import-Statistik">
      <div class="upload-stat">
        <div class="upload-stat-label">Heute</div>
        <div class="upload-stat-value" id="uploadTodayValue">–</div>
      </div>
      <div class="upload-stat-divider"></div>
      <div class="upload-stat">
        <div class="upload-stat-label">Woche</div>
        <div class="upload-stat-value" id="uploadWeekValue">–</div>
      </div>
      <div class="upload-stat-divider"></div>
      <div class="upload-stat upload-stat-sync">
        <div class="upload-stat-label">Sync</div>
        <div class="upload-stat-value" id="uploadSyncValue">–</div>
      </div>
    </div>
<div id="openCountWidget" class="state-green" aria-label="Offene Akten">
  <div class="chip"></div>
  <div class="label">Offene Akten</div>
  <div class="value">0</div>
</div>
    <div id="updateInfo" class="update-info"></div>
  </div>

<script src="script.js?v=27"></script>
</body>
</html>
